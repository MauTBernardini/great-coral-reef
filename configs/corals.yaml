corals:
  - coral_id: staghorn
    name: Staghorn Coral
    cost:
      sun: 3
    base_points: 2
    traits: [branching]
    max_height_gain: 1
    requires_support: true
    # Apenas as duas camadas mais ao topo (não pode ser construído no fundo).
    allowed_layers: [1, 2]

  - coral_id: elkhorn
    name: Elkhorn Coral
    cost:
      sun: 3
      plankton: 1
    base_points: 3
    traits: [branching]
    max_height_gain: 1
    requires_support: true

  - coral_id: grooved_brain_coral
    name: Grooved Brain Coral
    cost:
      sun: 2
    base_points: 3
    traits: [massive]
    max_height_gain: 1
    requires_support: true
    # Apenas as duas primeiras camadas (fundo e a camada seguinte).
    allowed_layers: [0, 1]
