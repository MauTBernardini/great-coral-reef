# deck_count = quantas cópias deste coral existem no baralho fechado de corais
# (a "disponibilidade" do coral). Compra-se cartas do baralho para a mão (teto de 10)
# e constrói-se corais gastando a carta correspondente da mão.
# Total do baralho: 16+12+16+8+8+12+16+12 = 100 cartas (proporção ×2).
#
# types = tipos descritivos (hard/soft, massive/branching, nps).
# thermal_resistance = low | average | high | null ("-", sem classificação).
corals:
  - coral_id: staghorn
    name: Staghorn Coral
    cost:
      sun: 3
    base_points: 2
    traits: [branching]
    requires_support: true
    allowed_layers: [1, 2]
    deck_count: 16
    o2: 1
    habitat_capacity: 2
    types: [hard, branching]
    thermal_resistance: high

