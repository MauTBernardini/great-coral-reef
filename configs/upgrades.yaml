# Cartas de "Upgrade": melhoram o board no PRESENTE (efeitos permanentes enquanto
# possuídas), em contraste com os Instintos (pontuação de fim de jogo).
# Ao fechar uma pond, o jogador escolhe 1 entre 2 Instintos OU 1 entre 2 Upgrades.
# Teto: 3 cartas de pond (instinto+upgrade combinados) além do instinto inicial.
#
#   effect -> chave usada no engine para aplicar o efeito.
upgrades:
  - upgrade_id: safe_nursery
    name: Safe Nursery
    effect: plankton_on_small_fish_death
    # Quando um peixe pequeno SEU morre (sacrifício), você gera 1 Plâncton.

  - upgrade_id: saber_teeth
    name: Saber Teeth
    effect: predators_patrol_diagonal
    # Seus predadores também patrulham (bloqueiam fauna) nas diagonais.

  - upgrade_id: slow_metabolist
    name: Slow Metabolist
    effect: double_habitat_capacity
    # Seus corais abrigam até 2x a capacidade habitacional normal.

  - upgrade_id: attraction_pheromones
    name: Attraction Pheromones
    effect: move_small_fish_including_enemy
    # Bônus grátis 1x/turno: mover 1 small fish (seu OU do inimigo) para um coral
    # adjacente. Só reposiciona (a posse do peixe não muda).

  - upgrade_id: accelerated_calcification
    name: Accelerated Calcification
    effect: hard_coral_sun_discount
    # Construir seus corais 'hard' custa 1 Sol a menos (mínimo de 1 Sol).

  - upgrade_id: mucus_filtration
    name: Mucus Filtration
    effect: soft_coral_plankton_on_enemy_adjacent
    # Quando o oponente constrói um coral adjacente a um coral 'soft' seu, você gera
    # +1 Plâncton.

  - upgrade_id: efficient_photosynthesis
    name: Efficient Photosynthesis
    effect: hard_coral_top_layers_sun
    # Seus corais 'hard' nas 2 camadas de cima produzem +1 Sol na Fase de Produção.

  - upgrade_id: generalist_diet
    name: Generalist Diet
    effect: feed_substitution_sun
    # 1x/rodada: gastar 1 Sol para cobrir 1 "feed" (na Produção, salva 1 fauna que
    # seria sacrificada por falta de O2). (Substituição de 1 Plâncton em custos: a fazer.)

