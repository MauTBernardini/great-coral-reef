# Cartas de "Instinto": objetivos secretos de fim de jogo.
# No início da partida cada jogador recebe 2 opções (do baralho embaralhado) e
# escolhe 1 para si. Ao final, a carta escolhida adiciona pontos conforme sua regra.
#
# Campos:
#   points  -> pontos por unidade contada pela regra
#   rule    -> chave despachada em engine/scoring.py (score_instinct)
instincts:
  - instinct_id: vertical_architect
    name: Vertical Architect
    points: 3
    rule: towers_reaching_surface
    # 3 pontos por torre de corais sua que atinge a camada mais de superfície.

  - instinct_id: dominance_of_species
    name: Dominance of Species
    points: 2
    rule: dominant_coral_type
    # 2 pontos por tile ocupado por um coral do seu tipo dominante (o mais numeroso).

  # DESATIVADA por ora: a definição de "sinergia" precisa ser revista (não é apenas
  # fauna morando em coral). Reabilitar depois com a regra correta.
  # - instinct_id: total_symbiosis
  #   name: Total Symbiosis
  #   points: 3
  #   rule: symbiosis_pairs
  #   # 3 pontos por par de cartas com sinergia ativada.

  - instinct_id: outer_wall
    name: Outer Wall
    points: 2
    rule: corals_on_edge
    # 2 pontos por coral seu numa coluna da borda do tabuleiro.

  - instinct_id: tunnel_engineer
    name: Tunnel Engineer
    points: 3
    rule: bottom_layer_connected_trios
    # 3 pontos por grupo de 3 corais seus conectados na camada do fundo (z=0).

  - instinct_id: overcrowded_nursery
    name: Overcrowded Nursery
    points: 2
    rule: full_habitat_corals
    # 2 pontos por coral seu 100% cheio (capacidade habitacional totalmente ocupada).

  - instinct_id: energy_reserve
    name: Energy Reserve
    points: 1
    rule: leftover_resources_div3
    # 1 ponto por (Sol + Plâncton restantes) // 3 ao final do jogo.

  - instinct_id: empire_of_the_frontier
    name: Empire of the Frontier
    points: 2
    rule: corals_bordering_opponent
    # 2 pontos por coral seu que faz fronteira (vizinho) com um tile do oponente.

  - instinct_id: buffer_zone
    name: Buffer Zone
    points: 1
    rule: empty_sandy_beds_between
    # 1 ponto por Sandy Bed vazio entre um coral seu e um do oponente (zona-tampão).

  - instinct_id: columns_of_hercules
    name: Columns of Hercules
    points: 4
    rule: full_height_towers
    # 4 pontos por torre sua completa (todas as camadas preenchidas).

  - instinct_id: opportunistic_parasite
    name: Opportunistic Parasite
    points: 3
    rule: parasites_on_enemy
    # 3 pontos por fauna sua vivendo num coral inimigo. ESTA carta habilita a ação
    # de jogar fauna em corais do oponente (parasitismo) para quem a possui.
