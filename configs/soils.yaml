# Tiles de solo (fundacao obrigatoria dos corais).
# - So podem ser colocados na camada do fundo (z=0).
# - Custam Sol para comprar e geram recursos por Fase de Producao.
# - Um coral so pode ser construido numa coluna cujo tile de fundo tenha solo.
# - supply: quantidade disponivel no suprimento COMPARTILHADO.
#   Disponibilidade: Sandy Bed (mais) > Rocky Reef = Dark Overhang > Seagrass Meadow (menos).
soils:
  - soil_id: sandy_bed
    name: Sandy Bed
    cost:
      sun: 1
    production:
      sun: 1
    supply: 8

  - soil_id: rocky_reef
    name: Rocky Reef
    cost:
      sun: 2
    production:
      plankton: 1
    # Habilidade: corais construidos nesta coluna custam 1 Sol a menos.
    coral_cost_reduction: 1
    supply: 5

  - soil_id: dark_overhang
    name: Dark Overhang
    cost:
      sun: 2
    production:
      plankton: 1
    supply: 5

  - soil_id: seagrass_meadow
    name: Seagrass Meadow
    cost:
      sun: 2
    production:
      sun: 2
      plankton: 1
    supply: 2
