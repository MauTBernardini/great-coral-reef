corals:
  - coral_id: staghorn
    name: Staghorn Coral
    cost:
      sun: 3
    base_points: 2
    traits: [branching]
    max_height_gain: 1
    requires_support: true
    # Apenas as duas camadas mais ao topo (não pode ser construído no fundo).
    allowed_layers: [1, 2]

  - coral_id: elkhorn
    name: Elkhorn Coral
    cost:
      sun: 2
      plankton: 1
    base_points: 3
    traits: [branching]
    max_height_gain: 1
    requires_support: true

  - coral_id: grooved_brain_coral
    name: Grooved Brain Coral
    cost:
      sun: 2
    base_points: 3
    traits: [massive]
    max_height_gain: 1
    requires_support: true
    # Apenas as duas primeiras camadas (fundo e a camada seguinte).
    allowed_layers: [0, 1]

  - coral_id: fox_coral
    name: Fox Coral
    cost:
      sun: 3
      plankton: 1
    base_points: 0
    traits: []
    requires_support: true
    # Layer 2 ou 3 (z=1 ou z=2).
    allowed_layers: [1, 2]
    production:
      plankton: 1
    # Oponentes não podem construir em células vizinhas (mesma camada).
    blocks_opponent_adjacent: true
    # Scoring: 2 pontos por tile vizinho (mesma camada) vazio.

  - coral_id: sun_coral
    name: Sun Coral
    cost:
      plankton: 3
    base_points: 5
    traits: []
    requires_support: true
    production:
      plankton: 1
    # Só pode ser construído em coluna cuja base seja Dark Overhang.
    required_soil: dark_overhang
    # Scoring: 5 pontos fixos.

  - coral_id: gorgonian_sea_fan
    name: Gorgonian Sea Fan
    cost:
      sun: 1
      plankton: 2
    base_points: 0
    traits: []
    requires_support: true
    production:
      plankton: 2
    # Scoring: 2 pontos por Gorgonian Sea Fan (mesmo dono) na mesma coluna vertical.

  - coral_id: branched_finger_coral
    name: Branched Finger Coral
    cost:
      sun: 1
    base_points: 1
    traits: []
    requires_support: true
    # Habilidade: se construído numa coluna Rocky Reef, devolve 1 Sol.
    refund_soil: rocky_reef
    refund_sun: 1
    # Scoring: 1 ponto fixo.

  - coral_id: bubble_coral
    name: Bubble Coral
    cost:
      sun: 3
      plankton: 1
    base_points: 0
    traits: []
    requires_support: true
    # Apenas as duas primeiras camadas.
    allowed_layers: [0, 1]
    production:
      plankton: 1
    # Scoring: 2 pontos se adjacente (mesma camada) a >=2 tipos diferentes de coral.
